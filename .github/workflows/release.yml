name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vidu-cli-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vidu-cli-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vidu-cli-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: vidu-cli-linux-arm64
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vidu-cli-win32-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/vidu-cli ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/vidu-cli.exe ${{ matrix.artifact }}
        shell: bash

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm/vidu-cli/package.json'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('npm/vidu-cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if echo "$VERSION" | grep -qE '\-beta\.'; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          elif echo "$VERSION" | grep -qE '\-canary\.'; then
            echo "tag=canary" >> $GITHUB_OUTPUT
          elif echo "$VERSION" | grep -qE '\-rc\.'; then
            echo "tag=rc" >> $GITHUB_OUTPUT
          elif echo "$VERSION" | grep -q '\-'; then
            echo "tag=next" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        run: npm publish npm/vidu-cli/ --access public --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
